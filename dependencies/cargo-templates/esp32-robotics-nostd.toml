[package]
name = "esp32-robot"
version = "0.1.0"
authors = ["Michael"]
edition = "2021"
license = "MIT"

[dependencies]
# ESP32 HAL
esp-hal = "0.17"
esp-backtrace = "0.11"
esp-println = "0.9"
esp-alloc = "0.3"

# Async runtime
embassy-executor = { version = "0.5", features = ["arch-xtensa", "executor-thread"] }
embassy-time = "0.3"

# Embedded HAL traits
embedded-hal = "1.0"
embedded-hal-async = "1.0"
embedded-io = "0.6"

# Sensor drivers (I2C/SPI)
mpu6050 = "0.1"  # IMU
bmp280 = "0.3"   # Pressure/temp
vl53l0x = "0.4"  # ToF distance sensor

# Motor control
# (typically custom, but these are helpful)
pwm-pca9685 = "0.3"  # PWM driver

# Math & algorithms
micromath = "2.0"     # Fast math for embedded
nalgebra = { version = "0.32", default-features = false, features = ["libm"] }

# Serialization (for config/comms)
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde-json-core = "0.5"

# Fixed-point math
fixed = "1.24"

# Heapless data structures
heapless = "0.8"

[profile.release]
opt-level = "z"      # Optimize for size
lto = true           # Link-time optimization
codegen-units = 1    # Better optimization
strip = true         # Strip symbols

[profile.dev]
opt-level = 1        # Some optimization for dev
debug = true
