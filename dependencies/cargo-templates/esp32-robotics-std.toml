[package]
name = "esp32-robot-std"
version = "0.1.0"
authors = ["Michael"]
edition = "2021"

[dependencies]
# ESP-IDF framework
esp-idf-svc = { version = "0.48", features = ["binstart", "embassy-time-driver"] }
esp-idf-hal = "0.43"
esp-idf-sys = { version = "0.34", features = ["binstart"] }

# Async runtime (Tokio for std)
tokio = { version = "1", features = ["full"] }
embassy-time = "0.3"

# Embedded HAL
embedded-hal = "1.0"
embedded-svc = "0.26"

# Networking
embedded-svc = { version = "0.26", features = ["experimental"] }

# MQTT for robot communication
rumqttc = "0.23"  # MQTT client

# Sensor drivers (same as no_std)
mpu6050 = "0.1"
bmp280 = "0.3"

# Math
nalgebra = "0.32"
micromath = "2.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
log = "0.4"
env_logger = "0.11"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

[build-dependencies]
embuild = "0.31"

[profile.release]
opt-level = "s"
lto = true
