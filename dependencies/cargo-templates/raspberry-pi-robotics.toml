[package]
name = "rpi-robot"
version = "0.1.0"
authors = ["Michael"]
edition = "2021"

[dependencies]
# Raspberry Pi GPIO/peripherals
rppal = { version = "0.17", features = ["hal"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Sensor drivers (embedded-hal compatible)
mpu6050 = "0.1"
bmp280 = "0.3"
vl53l0x = "0.4"
hcsr04 = "0.1"  # Ultrasonic

# Motor control
pwm-pca9685 = "0.3"

# Math & robotics algorithms
nalgebra = "0.32"
micromath = "2.0"

# Kalman filtering (sensor fusion)
adskalman = "0.5"

# PID control
pid = "4.0"

# ROS2 bindings (when ready)
# r2r = "0.8"  # Uncomment when using ROS2

# Networking
tokio-serial = "5.4"  # Serial communication
socket2 = "0.5"

# MQTT
rumqttc = "0.23"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Configuration
toml = "0.8"

# Logging
log = "0.4"
env_logger = "0.11"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
